# Computer systems and networking.
# Source: ACM CCS "Computer systems organization" and "Networks";
# standard OS and networking textbooks (Tanenbaum, Silberschatz, Kurose-Ross).

area:
  slug: systems-and-networking
  title: Systems and Networking
  source: acm-ccs:computer-systems-organization
  parent: 07-technology/computing

leaves:
  # Operating systems
  - slug: operating-system
    title: Operating System
    summary: Software managing hardware resources and providing services to applications.
    difficulty: 1
    facts:
      - "Core responsibilities: process management, memory management, file systems, device I/O, networking, security."
      - "Runs in privileged (kernel) mode; applications run in user mode with restricted access."
      - "Major families: Unix-like (Linux, BSD, macOS), Windows, mobile (iOS, Android — both Unix-derived)."
    sources:
      wikipedia: "Operating_system"

  - slug: process
    title: Process
    summary: Running instance of a program with its own memory space.
    difficulty: 1
    facts:
      - "Each process has isolated virtual address space — one process can't directly read another's memory."
      - "Created by fork() (Unix) or CreateProcess() (Windows)."
      - "Communicate via IPC: pipes, sockets, shared memory, signals."
    sources:
      wikipedia: "Process_(computing)"

  - slug: thread
    title: Thread
    summary: Unit of execution within a process; threads share memory with other threads in the same process.
    difficulty: 2
    facts:
      - "Lighter-weight than processes — cheaper to create and switch."
      - "Shared memory enables fast communication but introduces race conditions."
      - "Kernel threads are scheduled by the OS; user-level threads (green threads, coroutines) are scheduled in-process."
    sources:
      wikipedia: "Thread_(computing)"

  - slug: virtual-memory
    title: Virtual Memory
    summary: Abstraction giving each process its own contiguous address space, mapped to physical memory via page tables.
    difficulty: 3
    facts:
      - "Enables processes to address more memory than physically available (via paging to disk)."
      - "Provides isolation and protection — one process can't access another's memory."
      - "Pages typically 4 KB; TLB (Translation Lookaside Buffer) caches recent address translations."
      - "Page faults occur when referenced page is not in memory — handled by the OS, possibly with disk I/O."
    sources:
      wikipedia: "Virtual_memory"

  - slug: system-call
    title: System Call
    summary: Controlled entry point for user programs to request services from the kernel.
    difficulty: 2
    facts:
      - "Transitions from user mode to kernel mode via a trap instruction."
      - "Expensive compared to function calls — contexts switch, TLB/cache effects."
      - "Common syscalls: read, write, open, close, fork, exec, mmap, socket."
    sources:
      wikipedia: "System_call"

  - slug: scheduling
    title: Scheduling (OS)
    summary: OS decision about which process/thread runs next on a CPU.
    difficulty: 3
    facts:
      - "Preemptive scheduling: OS can interrupt a running task; cooperative: task must yield."
      - "Common algorithms: round-robin, priority, multilevel feedback queue, CFS (Linux's Completely Fair Scheduler)."
      - "Balancing throughput, latency, fairness, and real-time guarantees is a core tension."
    sources:
      wikipedia: "Scheduling_(computing)"

  - slug: concurrency
    title: Concurrency
    summary: Ability of a system to make progress on multiple tasks.
    difficulty: 3
    facts:
      - "Concurrency ≠ parallelism: concurrency is about structure (interleaved progress), parallelism is about execution (simultaneous)."
      - "Concurrent code is notoriously hard — race conditions, deadlocks, livelocks, starvation."
      - "Models: shared memory (mutex, condition variables), message passing (actors, channels), transactional memory."
    sources:
      wikipedia: "Concurrency_(computer_science)"

  - slug: race-condition
    title: Race Condition
    summary: Bug where the outcome depends on unpredictable timing of concurrent operations.
    difficulty: 3
    facts:
      - "Classic example: two threads incrementing a shared counter without synchronization."
      - "Often nondeterministic — hard to reproduce and test for."
      - "Prevented by synchronization (locks, atomic operations) or avoiding shared mutable state."
    sources:
      wikipedia: "Race_condition"

  - slug: mutex
    title: Mutex
    summary: Mutual-exclusion lock ensuring only one thread accesses a resource at a time.
    difficulty: 2
    facts:
      - "Thread attempting to acquire a held mutex blocks until it's released."
      - "Must be released — forgetting to release causes deadlock; releasing too early races."
      - "Related primitives: semaphore (counting), read-write lock (multiple readers OR one writer), spinlock (busy-wait)."
    sources:
      wikipedia: "Lock_(computer_science)"

  # Networking fundamentals
  - slug: tcp-ip
    title: TCP/IP
    summary: Foundational protocol suite of the internet.
    difficulty: 2
    facts:
      - "Four-layer model: link, internet (IP), transport (TCP/UDP), application (HTTP, DNS, SSH, etc.)."
      - "IP handles addressing and routing of packets between hosts; best-effort, no reliability guarantee."
      - "TCP adds reliability, ordering, flow control, congestion control on top of IP."
      - "Developed by DARPA in the 1970s; became the internet standard in the 1980s."
    key_dates:
      - "1983: ARPANET transitions to TCP/IP."
    sources:
      wikipedia: "Internet_protocol_suite"

  - slug: osi-model
    title: OSI Model
    summary: Seven-layer conceptual model for network protocols.
    difficulty: 2
    facts:
      - "Layers (bottom-up): Physical, Data Link, Network, Transport, Session, Presentation, Application."
      - "Pedagogical — real internet protocols follow TCP/IP's four layers more closely."
      - "Mnemonic: 'Please Do Not Throw Sausage Pizza Away'."
    sources:
      wikipedia: "OSI_model"

  - slug: tcp-vs-udp
    title: TCP vs. UDP
    summary: TCP is reliable and ordered; UDP is connectionless and best-effort.
    difficulty: 2
    facts:
      - "TCP: connection-oriented, reliable, ordered, flow/congestion controlled — used for HTTP, SSH, SMTP."
      - "UDP: connectionless, best-effort, low overhead — used for DNS, video streaming, online gaming."
      - "TCP handshake (SYN, SYN-ACK, ACK) establishes connection before data flows."
      - "QUIC (used by HTTP/3) is a newer transport on UDP that provides TCP-like reliability with lower latency."
    sources:
      wikipedia: "Transmission_Control_Protocol"

  - slug: http
    title: HTTP
    summary: Application-layer request-response protocol; foundation of the web.
    difficulty: 2
    facts:
      - "Stateless — each request is independent; state maintained via cookies, tokens, or server session."
      - "Methods: GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS."
      - "Status codes: 1xx info, 2xx success, 3xx redirect, 4xx client error, 5xx server error."
      - "Versions: HTTP/1.1 (text, persistent connections), HTTP/2 (multiplexed binary), HTTP/3 (on QUIC/UDP)."
    sources:
      wikipedia: "HTTP"

  - slug: https-tls
    title: HTTPS / TLS
    summary: HTTP over TLS; provides encryption, integrity, and authentication for web traffic.
    difficulty: 2
    aliases: [https, tls]
    facts:
      - "TLS replaced SSL (SSL 3.0 and earlier are deprecated and insecure)."
      - "Handshake establishes session keys via asymmetric crypto, then uses symmetric crypto for bulk data."
      - "Certificates signed by trusted CAs bind public keys to hostnames."
      - "Current standard: TLS 1.3 (2018), significantly simpler and faster than 1.2."
    sources:
      wikipedia: "Transport_Layer_Security"

  - slug: dns
    title: DNS
    summary: Domain Name System — maps human-readable names to IP addresses via a distributed hierarchy.
    difficulty: 2
    facts:
      - "Hierarchical: root servers → TLD servers (.com) → authoritative servers for a domain."
      - "Common record types: A (IPv4), AAAA (IPv6), CNAME (alias), MX (mail), TXT (arbitrary text), NS (name server)."
      - "Caching throughout the hierarchy means propagation delays; TTLs control cache lifetime."
      - "Standard port 53; DNS-over-HTTPS (DoH) and DNS-over-TLS (DoT) add privacy."
    sources:
      wikipedia: "Domain_Name_System"

  - slug: socket
    title: Socket
    summary: Endpoint for network communication, identified by IP address and port.
    difficulty: 2
    facts:
      - "Socket pair (source-ip, source-port, dest-ip, dest-port) uniquely identifies a TCP connection."
      - "Port ranges: 0–1023 well-known (HTTP 80, HTTPS 443, SSH 22), 1024–49151 registered, 49152–65535 dynamic/private."
      - "Berkeley sockets API is the standard interface (socket, bind, listen, accept, connect, send, recv)."
    sources:
      wikipedia: "Network_socket"

  - slug: routing
    title: Routing
    summary: Process of selecting paths for packets across a network.
    difficulty: 3
    facts:
      - "Routers maintain routing tables; forwarding decisions are local at each hop."
      - "Interior Gateway Protocols (within an AS): OSPF (link-state), RIP (distance-vector)."
      - "Exterior Gateway Protocol (between ASes): BGP — the protocol that 'runs the internet'."
      - "BGP is trust-based by design, making it historically vulnerable to hijacking."
    sources:
      wikipedia: "Routing"

  # Storage and databases
  - slug: relational-database
    title: Relational Database
    summary: Data organized in tables with typed columns and foreign-key relationships.
    difficulty: 2
    facts:
      - "Based on relational algebra (Edgar Codd, 1970)."
      - "Normalization reduces redundancy: 1NF (atomic values), 2NF, 3NF, BCNF."
      - "Typical use: transactional workloads with complex queries and integrity constraints."
      - "Major implementations: PostgreSQL, MySQL/MariaDB, SQL Server, Oracle, SQLite."
    key_dates:
      - "1970: Codd publishes 'A Relational Model of Data for Large Shared Data Banks'."
    sources:
      wikipedia: "Relational_database"

  - slug: sql
    title: SQL
    summary: Declarative language for querying and manipulating relational data.
    difficulty: 2
    facts:
      - "Subsets: DDL (CREATE, ALTER), DML (SELECT, INSERT, UPDATE, DELETE), DCL (GRANT, REVOKE)."
      - "Declarative: you specify what result you want; the query planner decides how to compute it."
      - "Standardized by ISO/ANSI, but vendors extend and diverge in details."
      - "Common pitfalls: N+1 queries, unindexed joins, SQL injection, NULL handling."
    sources:
      wikipedia: "SQL"

  - slug: nosql
    title: NoSQL
    summary: Umbrella term for non-relational databases.
    difficulty: 2
    facts:
      - "Main types: document (MongoDB), key-value (Redis, DynamoDB), wide-column (Cassandra, HBase), graph (Neo4j)."
      - "Typically trade strict consistency or relational queries for horizontal scalability or flexible schema."
      - "'NoSQL' → 'Not Only SQL' — often coexists with relational databases in the same system."
    sources:
      wikipedia: "NoSQL"

  - slug: acid-properties
    title: ACID Properties
    summary: Guarantees traditional databases provide on transactions.
    difficulty: 3
    aliases: [acid]
    facts:
      - "Atomicity: a transaction is all-or-nothing."
      - "Consistency: a transaction leaves the database in a valid state, preserving invariants."
      - "Isolation: concurrent transactions don't interfere; serializable is the strongest level."
      - "Durability: committed changes survive crashes."
    sources:
      wikipedia: "ACID"

  - slug: cap-theorem
    title: CAP Theorem
    summary: In a distributed system you can only have two of Consistency, Availability, Partition tolerance.
    difficulty: 3
    facts:
      - "Partition tolerance is not optional in practice — networks partition."
      - "So real choice is CP (consistent but unavailable during partition) or AP (available but possibly stale)."
      - "PACELC extends CAP: even without partitions, there's a tradeoff between Latency and Consistency."
    key_dates:
      - "2000: Brewer states CAP conjecture; 2002: Gilbert & Lynch prove it."
    sources:
      wikipedia: "CAP_theorem"

  # Distributed systems
  - slug: distributed-system
    title: Distributed System
    summary: System of independent computers communicating over a network, presenting as a coherent whole.
    difficulty: 3
    facts:
      - "'The Fallacies of Distributed Computing' (Deutsch): network is not reliable, latency is not zero, bandwidth is not infinite, etc."
      - "Failures are partial — some nodes work, others don't — unlike single-machine systems."
      - "Inherently concurrent, asynchronous, and prone to clock drift."
    sources:
      wikipedia: "Distributed_computing"

  - slug: consensus-algorithm
    title: Consensus Algorithm
    summary: Algorithm by which distributed nodes agree on a value despite failures.
    difficulty: 4
    aliases: [paxos, raft]
    facts:
      - "FLP impossibility (1985): in an asynchronous system with even one faulty process, no deterministic consensus algorithm can both be safe and live."
      - "Paxos: foundational but notoriously hard to understand and implement correctly."
      - "Raft (2014): designed for understandability; elects a leader, who replicates a log to followers."
      - "Byzantine consensus tolerates arbitrarily faulty (including malicious) nodes — used in blockchains."
    sources:
      wikipedia: "Consensus_(computer_science)"

  - slug: replication
    title: Replication
    summary: Keeping copies of data across multiple nodes for fault tolerance or read scaling.
    difficulty: 3
    facts:
      - "Synchronous: writes aren't acknowledged until replicas confirm — safer but slower."
      - "Asynchronous: writes acknowledge immediately, replicate in background — faster but replicas may lag."
      - "Leader-based (single writer) vs. multi-leader vs. leaderless (Dynamo-style)."
      - "Replication increases availability and read throughput but complicates consistency."
    sources:
      wikipedia: "Replication_(computing)"

  - slug: sharding
    title: Sharding
    summary: Horizontal partitioning of data across multiple databases to scale write throughput.
    difficulty: 3
    facts:
      - "Each shard holds a subset of the data based on a shard key (hash-based, range-based, directory-based)."
      - "Cross-shard queries and transactions are much harder than single-shard ones."
      - "Resharding (changing the partitioning scheme) is painful — choose shard keys carefully."
    sources:
      wikipedia: "Shard_(database_architecture)"

  # Infrastructure
  - slug: cache
    title: Cache
    summary: Fast storage layer holding a subset of data to reduce access time.
    difficulty: 2
    facts:
      - "Hierarchy: CPU registers → L1/L2/L3 cache → RAM → disk → network."
      - "Eviction policies: LRU (least recently used), LFU, FIFO, random."
      - "'There are only two hard things in Computer Science: cache invalidation and naming things.' — Phil Karlton"
      - "Cache hit rate is the dominant performance factor at most layers."
    sources:
      wikipedia: "Cache_(computing)"

  - slug: load-balancer
    title: Load Balancer
    summary: Distributes incoming requests across multiple backend servers.
    difficulty: 2
    facts:
      - "Algorithms: round-robin, least-connections, weighted, IP-hash (for session affinity)."
      - "L4 (transport-layer, TCP/UDP) vs. L7 (application-layer, HTTP-aware — can route by URL, headers, cookies)."
      - "Healthchecks remove unhealthy backends automatically."
    sources:
      wikipedia: "Load_balancing_(computing)"

  - slug: cdn
    title: Content Delivery Network (CDN)
    summary: Geographically distributed cache of static content served from edges close to users.
    difficulty: 2
    facts:
      - "Reduces latency by serving from a nearby edge rather than the origin server."
      - "Origin offloading reduces bandwidth and load on the source."
      - "Major providers: Cloudflare, Akamai, Fastly, AWS CloudFront."
      - "Cache invalidation and purging are the hard parts."
    sources:
      wikipedia: "Content_delivery_network"

  - slug: container
    title: Container
    summary: Lightweight, isolated process environment sharing the host kernel.
    difficulty: 2
    aliases: [docker]
    facts:
      - "Uses Linux kernel features (cgroups, namespaces) for resource isolation without full virtualization."
      - "Lighter than VMs: no guest kernel, faster start, smaller footprint."
      - "Container images are immutable, layered, and versioned — enabling reproducible deployment."
    key_dates:
      - "2013: Docker open-sourced, popularizes container tooling."
    sources:
      wikipedia: "Containerization_(computing)"

  - slug: kubernetes
    title: Kubernetes
    summary: Container orchestration platform for deploying, scaling, and managing containerized workloads.
    difficulty: 3
    facts:
      - "Declarative API: you describe desired state, controllers reconcile toward it."
      - "Core abstractions: Pod (group of containers), Service (stable endpoint), Deployment (replicated, updatable Pods), Ingress (external access)."
      - "Originated at Google (Borg heritage), open-sourced in 2014; now the dominant container orchestrator."
    sources:
      wikipedia: "Kubernetes"

  - slug: virtual-machine
    title: Virtual Machine
    summary: Software emulation of a full computer, running its own kernel atop a hypervisor.
    difficulty: 2
    facts:
      - "Type 1 hypervisor (bare-metal): runs directly on hardware (VMware ESXi, Hyper-V, Xen, KVM)."
      - "Type 2 hypervisor (hosted): runs on top of an OS (VirtualBox, VMware Workstation)."
      - "Stronger isolation than containers but heavier — each VM runs a full OS."
    sources:
      wikipedia: "Virtual_machine"
